<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TabOrganizer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      }
      .center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }
      .brand {
        width: 64px;
        height: 64px;
        background: #fff;
        border-radius: 12px;
        position: relative;
      }
      .brand::before,
      .brand::after,
      .brand > i {
        content: '';
        position: absolute;
        left: 10px;
        right: 10px;
        height: 4px;
        background: #000;
        border-radius: 999px;
      }
      .brand::before { top: 14px; }
      .brand > i { top: 30px; }
      .brand::after { bottom: 14px; }
      .name {
        font-family: 'Space Grotesk', 'Consolas', monospace;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
        opacity: 0;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50%      { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="brand"><i></i></div>
      <div class="name">TabOrganizer · loading</div>
    </div>
    <script>
      // 等 extension service worker 啟動完成後再跳轉
      const EXT_ID = 'eanilmbkohdgpndehpbikchfpnaboloh';
      const MGR = `chrome-extension://${EXT_ID}/src/manager/manager.html`;

      function tryLoad(attempt) {
        if (attempt > 20) {
          // 20 次（10 秒）後仍未 ready 直接跳，讓 Chrome 顯示原生錯誤訊息
          location.replace(MGR);
          return;
        }
        // 探測 extension 是否已可訪問
        fetch(MGR, { method: 'HEAD', mode: 'no-cors' })
          .then(() => location.replace(MGR))
          .catch(() => setTimeout(() => tryLoad(attempt + 1), 500));
      }

      // 初始延遲 500ms 讓 Chrome 完成第一次 register extension
      setTimeout(() => tryLoad(0), 500);
    </script>
  </body>
</html>
